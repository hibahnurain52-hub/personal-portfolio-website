<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2 class="text-center">Responsive Grid Example</h2>
  
  <div class="row">
    <div class="col-md-4 bg-primary text-white p-3 border">
      <h3>Column 1</h3>
      <p>I am 1/3 of the width on laptops.</p>
    </div>

    <div class="col-md-4 bg-success text-white p-3 border">
      <h3>Column 2</h3>
      <p>I stack on top of others on phones.</p>
    </div>

    <div class="col-md-4 bg-info text-white p-3 border">
      <h3>Column 3</h3>
      <p>Bootstrap handles the spacing!</p>
    </div>
  </div>
</div>

</body>
</html>
