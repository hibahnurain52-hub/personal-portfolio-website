<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap + JS Logic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 50px; background-color: #f8f9fa; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 10px; }
        #statusMessage { font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container shadow-sm">
        <h2 class="mb-4">Login System</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label for="userEmail" class="form-label">Email address</label>
                <input type="email" class="form-control" id="userEmail" required>
            </div>
            <div class="mb-3">
                <label for="userPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="userPassword" required>
                <div class="form-text">Must be at least 6 characters.</div>
            </div>
            
            <p id="statusMessage"></p>

            <button type="button" id="submitBtn" class="btn btn-primary w-100">Login</button>
        </form>
    </div>
</div>

<script>
    // 1. SELECTING ELEMENTS (DOM Manipulation)
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMessage');
    const emailField = document.getElementById('userEmail');
    const passwordField = document.getElementById('userPassword');

    // 2. ADDING AN EVENT LISTENER
    submitBtn.onclick = function() {
        // 3. VARIABLES: Capturing User Input
        let email = emailField.value;
        let password = passwordField.value;
        let passwordLength = password.length; 

        // 4. OPERATORS & EXPRESSIONS
        const isValidEmail = email.includes("@");
        const isLongEnough = passwordLength >= 6;

        // ==========================================================
        // MODIFIED CODE START: Capture all data regardless of logic
        // ==========================================================
        console.log("--- New Login Attempt ---");
        console.log("Captured Email: ", email);
        console.log("Captured Password Length: ", passwordLength);
        console.log("Is Data Valid? ", (isValidEmail && isLongEnough));
        // ==========================================================
        // MODIFIED CODE END
        // ==========================================================

        // 5. LOGICAL OPERATIONS
        if (isValidEmail && isLongEnough) {
            statusMsg.innerText = "Login Successful! Processing...";
            statusMsg.style.color = "green";
            passwordField.classList.remove("is-invalid"); // Clean up on success
        } 
        else {
            // ==========================================================
            // MODIFIED CODE START: Specific Error Logging
            // ==========================================================
            console.error("Invalid Login Attempt Blocked.");
            // ==========================================================
            // MODIFIED CODE END
            // ==========================================================

            statusMsg.innerText = "Error: Invalid Email or Password too short!";
            statusMsg.style.color = "red";
            passwordField.classList.add("is-invalid");
        }
    };
</script>

</body>
</html>
