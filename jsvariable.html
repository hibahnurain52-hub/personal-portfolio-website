<!DOCTYPE html>
<html lang="en">
<head>
    <title>JS Basics: Variables & Operators</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

    <div class="container text-center">
        <div class="card shadow-sm p-4 mx-auto" style="max-width: 400px;">
            <h3 class="text-primary">Receipt Generator</h3>
            <hr>
            <p id="itemDetail"></p>
            <h4 id="totalDisplay" class="text-success"></h4>
        </div>
    </div>

    <script>
        // 1. VARIABLES (Storing Data)
        let productName = "Gaming Mouse";
        let price = 50;       // Number
        let quantity = 3;    // Number
        let discount = 5;    // $5 off
        
        // 2. OPERATORS (Processing Data)
        // Arithmetic: Multiply (*) then Subtract (-)
        let total = (price * quantity) - discount;

        // 3. OUTPUT (DOM Manipulation)
        // Using Template Literals (backticks) to combine text and variables
        document.getElementById("itemDetail").innerText = 
            `Product: ${productName} | Qty: ${quantity}`;

        document.getElementById("totalDisplay").innerText = 
            `Total: $${total}`;

        // 4. CONSOLE LOG (For the Developer)
        console.log("Calculation successful!");
        console.log("Base Price:", price * quantity);
        console.log("Final Total after Discount:", total);
    </script>

</body>
</html>
