<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Proof Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">CDN Evidence Page</span>
            <a href="index.html" class="btn btn-outline-light btn-sm">Back to Home</a>
        </div>
    </nav>

    <div class="container">
        <div class="alert alert-warning border-dark text-center" role="alert">
            <h4 class="alert-heading">Is the CDN working?</h4>
            <p>If you see a <strong>Yellow Box</strong> and a <strong>Dark Top Bar</strong>, the CDN link is successful!</p>
            <hr>
            <p class="mb-0">Tip: Try deleting a letter in the link inside the <code>&lt;head&gt;</code> to see the styles vanish.</p>
        </div>

        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h2 class="card-title">Second Page</h2>
                        <p class="card-text text-muted">Notice how the same CDN link styles this page instantly.</p>
                        <button class="btn btn-success">CDN Active</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
